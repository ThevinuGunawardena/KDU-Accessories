<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Uniform Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 100px;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: auto;
        }
        .product {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 30px;
        }
        .product img {
            max-width: 306px;
            border-radius: 20px;
        }
        .product h3 {
            margin-top: 0;
        }
        .customization {
            margin-top: 10px;
        }
        .customization label {
            display: block;
            margin-bottom: 5px;
        }
        .customization input[type="text"],
        .customization select {
            padding: 5px;
            width: 100%;
            margin-bottom: 10px;
        }
        .add-to-cart {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            
        }
    </style>
</head>
<body>
    <center>
        <h1>KDU HONOUR SHOP</h1>
        </center> 
<div class="container">
      
    <br>     
    <!-- Badge -->
     
    <div class="product">
        <center><img src="badge.png" alt="Badge"></center>
        <br>
        <h3>KDU Badge</h3>
        <p>Price: රු.450/=</p>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <!-- Name Tag -->
    <div class="product">
       <center> <img src="nametag.png" alt="Name Tag"></center>
        <br>
        <h3>KDU Name Tag</h3>
        <p>Price: රු.300/=</p>
        <div class="customization">
            <label for="name">Enter Your First Name:</label>
            <input type="text" id="name" placeholder="Enter your first name">
            <label for="name">Enter Your Last Name:</label>
            <input type="text" id="name" placeholder="Enter your last name">
        </div>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <!-- Applet -->
    <div class="product">
        <center>
            <img src="applet.png" alt="Applet">
            </center>
            <h3>KDU Shoulder Applet</h3>
        <p>Price: රු.100/=</p>
        <div class="customization">
            <label for="faculty">Select Faculty:</label>
            <select id="faculty">
                <option value="engineering">FOE</option>
                <option value="business">FOT</option>
                <option value="arts">FOC</option>
                <!-- Add more faculties as needed -->
            </select>

            <label for="Year">Select Year:</label>
            <select id="Year">
                <option value="1">Year 1</option>
                <option value="2">Year 2</option>
                <option value="3">Year 3</option>
                <option value="4">Year 4</option>
            </select>
        </div>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    
</div>

<center>
    <div>
        <p>Project By <a href="http://thevinuvinan.com" target="_blank">D/ICT/24/0047 - Thevinu Gunawardena</a> from FOT</p>
    </div>
    </center>

</body>
</html>
